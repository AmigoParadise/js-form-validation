<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Form Validation</title>
    <!--<link rel="stylesheet" href="style.css">-->
</head>
<body>
    <div class="container">
        <h1>Join The Community</h1>
        <form action="" id="registration-form" novalidate>
            <div class="form-control">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                <span class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-control">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" placeholder="e.g. Indonesia" required>
                <span class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-control">
                <label for="zip">Zip Code</label>
                <input type="text" id="zip" name="zip" placeholder="12345" required pattern="\d{5}">
                <span class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-control">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
                <span class="error-message" aria-live="polite"></span>
            </div>

            <div class="form-control">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
                <span class="error-message" aria-live="polite"></span>
            </div>

            <button type="submit">Validate</button>
        </form>
    </div>
</body>
</html>
